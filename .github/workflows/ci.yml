name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: lyy-relay

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

  build-and-push:
    name: Build and Push relay to ECR
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Enable by setting repository variable ENABLE_ECR_PUSH=true in
    # GitHub Settings → Secrets and variables → Actions → Variables.
    # Requires:
    #   1) lyy-relay ECR repo exists in AWS account 542585190283 (✓ done)
    #   2) MeetMissionAI/lyy added to terraform.tfvars github_repositories
    #   3) lyy-relay arn added to main.tf external ECR list
    #   4) terraform apply against unee-infra/terraform/environments/prod
    #   5) AWS_GITHUB_ROLE_ARN secret set to arn:aws:iam::542585190283:role/unee-prod-gha
    if: github.ref == 'refs/heads/main' && vars.ENABLE_ECR_PUSH == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,suffix=-${{ github.ref_name }}
            type=ref,event=branch
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max,compression=zstd
